<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./sytles.css">
    <link rel="icon" type="favicon-convertmoney" href="./assets/logo.gif">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>DevClub Convert Money</title>
</head>

<body>
    <main>
        <header>
            <h1>Ike Convert Money</h1>
        </header>

        <label>
            Converter <b>de</b>
            <select id="currency-select-from">
                <option value="real">R$ Real Brasileiro</option>
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
                <option value="Bitcoin">₿ Bitcoin</option>
                <option value="libra">£ Libra Esterlina</option>
                <option value="iene">¥ Iene Japonês</option>
                <option value="yuan">¥ Yuan Chinês</option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select id="currency-select-to">
                <option value="dolar">US$ Dólar Americano</option>
                <option value="real">R$ Real Brasileiro</option>
                <option value="euro">€ Euro</option>
                <option value="Bitcoin">₿ Bitcoin</option>
                <option value="libra">£ Libra Esterlina</option>
                <option value="iene">¥ Iene Japonês</option>
                <option value="yuan">¥ Yuan Chinês</option>
            </select>
        </label>

        <label>
            Valor
            <input class="input-currency" placeholder="10.000,00">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img id="currency-img-from" src="./assets/real.png" alt="logo-moeda-a-converter">
                <p id="currency-name-from" class="currency">Real</p>
                <p id="currency-value-from" class="currency-value-to-convert">R$ 0,00</p>
            </div>
            
            <img id="swap-button" src="./assets/swap.png" alt="inverter-moedas">

            <div class="currency-box">
                <img id="currency-img-to" class="currency-img" src="./assets/dolar.png" alt="logo-moeda-convertida">
                <p id="currency-name-to" class="currency">Dólar Americano</p>
                <p id="currency-value-to" class="currency-value">US$ 0.0</p>
            </div>
        </section>
    </main>
</body>
<script src="./scripts.js"></script>


</html>
